<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netsakh Walewangko</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0a0a0b;
      }
    </style>
    <!--
      Single Page Apps for GitHub Pages
      Redirects deep links to index.html, preserving the path so React Router
      can render the right page. pathSegmentsToKeep = 1 because this is a
      project site served from /theflorist18portfolio/.
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      )
    </script>
  </head>
  <body></body>
</html>
